<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

<script>
//拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
window.Clipboard = (function(window, document, navigator) {
  var textArea,
      copy;

  // 判断是不是ios端
  function isOS() {
    return navigator.userAgent.match(/ipad|iphone/i);
  }
  //创建文本元素
  function createTextArea(text) {
    textArea = document.createElement('textArea');
    textArea.value = text;
    textArea.style.width = 0;
    textArea.style.height = 0;
    textArea.clientHeight = 0;
    textArea.clientWidth = 0;
    document.body.appendChild(textArea);
  }
  //选择内容
  function selectText() {
    var range,
        selection;

    if (isOS()) {
      range = document.createRange();
      range.selectNodeContents(textArea);
      selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      textArea.setSelectionRange(0, 999999);
    } else {
      textArea.select();
    }
  }

//复制到剪贴板
  function copyToClipboard() {        
    try{
      document.execCommand("Copy")
    }catch(err){
      alert("复制错误！请手动复制！")
    }
    document.body.removeChild(textArea);
  }

  copy = function(text) {
    createTextArea(text);
    selectText();
    copyToClipboard();
  };

  return {
    copy: copy
  };
})(window, document, navigator);

function copyCode (e) {
  if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
    let code = e.currentTarget.querySelector('code');
    var text = code.innerText;
    if (e.srcElement.textContent === '复制成功') {
      console.log('复制操作频率过高');
      return;
    }
    e.srcElement.textContent = '复制成功';
    (function(elem){
      setTimeout(() => {
        if (elem.textContent === '复制成功') {
          elem.textContent = '复制代码'
        }
      }, 1000);
    })(e.srcElement)
    Clipboard.copy(text);
  }
}

 let pres = document.querySelectorAll('pre');
 pres.forEach(pre => {
  let code = pre.querySelector('code');
  let copyElem = document.createElement('span');
  copyElem.classList.add('copy-code');
  copyElem.textContent = '复制代码';
  pre.appendChild(copyElem);
  pre.onclick = copyCode
 })
</script>

          <a class="result-title" href="https://badsn.com/post/win7-xiu-gai-wang-qia-mac-di-zhi/"" data-c="&lt;p&gt;Win7 下修改网卡的 Mac 地址&lt;/p&gt;
&lt;!--more--&gt;
&lt;p&gt;##操作步骤&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;查看网卡的驱动关键字&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;用你熟悉的方式打开是配置设置，然后点击属性：&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559205048893.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;然后点击配置，在详细信息里找到 “驱动程序关键字”：&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559205054562.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;记录：&lt;/p&gt;
&lt;p&gt;&lt;code&gt;{4d36e972-e325-11ce-bfc1-08002be10318}\0012&lt;/code&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;打开注册表&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;注册表位置是：&lt;/p&gt;
&lt;p&gt;&lt;code&gt;HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Class\&lt;/code&gt;&lt;/p&gt;
&lt;p&gt;后面添加上一步记录的 CLSID 得到：&lt;/p&gt;
&lt;p&gt;&lt;code&gt;HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Class\{4d36e972-e325-11ce-bfc1-08002be10318}\0012&lt;/code&gt;&lt;/p&gt;
&lt;p&gt;打开注册表，可以看到一些信息，确认是当前网卡注册表。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;修改或添加注册表&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;打开上面目录下的&lt;/p&gt;
&lt;p&gt;&lt;code&gt;*\Ndi\Params\NetworkAddress&lt;/code&gt;&lt;/p&gt;
&lt;p&gt;查看到内容：&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559205062009.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;可以看到 “ParamDesc” 的描述是 “本地管理地址”，继续第一步，打开高级选项卡，找到 “本地管理地址”选项，填写地址即可：&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559205067084.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;然后查看 MAC 地址已经被修改了。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;未找到注册表&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;如果未找到 “NetworkAddress” 注册表，可以手动添加，注册表内容如下：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-shell&#34;&gt;Windows Registry Editor Version 5.00

[HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Class\{4D36E972-E325-11CE-BFC1-08002BE10318}\0012\Ndi\Params\NetworkAddress]

        <div class="item">
          <a class="result-title" href="https://badsn.com/post/tortoisegit-you-jian-cai-dan-quan-bu-zhe-die-dao-er-ji-cai-dan-zhong/"" data-c="&lt;p&gt;TortoiseGit 和 TortoiseSVN 都安装时，右键菜单会很长，尝试将 TortoiseGit 的 Clone 菜单折叠到二级菜单中&lt;/p&gt;
&lt;!--more--&gt;
&lt;p&gt;默认效果：&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559204682888.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;太占空间，希望能把两个菜单折叠到一个里。&lt;/p&gt;
&lt;h2 id=&#34;查找资料&#34;&gt;查找资料&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;google，百度 查找右键菜单。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;查找折叠菜单，二级菜单，均没有实现。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;解决办法&#34;&gt;解决办法&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;上面百度到右键菜单在注册表相关，桌面右键为例：&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;普通右键菜单：&lt;br&gt;
&lt;code&gt;HKEY_LOCAL_MACHINE\SOFTWARE\Classes\Directory\Background\shell&lt;/code&gt;&lt;br&gt;
可以看到下面有 “在此处运行 CMD”&lt;br&gt;
COM组件右键菜单：&lt;br&gt;
&lt;code&gt;HKEY_LOCAL_MACHINE\SOFTWARE\Classes\Directory\Background\shellex&lt;/code&gt;&lt;br&gt;
可以看到下面有 TortoiseGit 和 TortoiseSVN 和其他的（新建，分享，小工具）。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;实验解决办法 一（未成功）&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;在 shell 下创建子菜单，将 COM 组件的菜单移到里面。失败。。。。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;实验解决办法 二 （成功）&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;突然想到 这个是开源项目啊，还有一个修改代码实现的方法，查看 TortoiseGit 右键菜单的 CLSID :&lt;br&gt;
&lt;code&gt;{10A0FDD2-B0C0-4CD4-A7AE-E594CE3B91C8}&lt;/code&gt;&lt;br&gt;
可以看到注册的 dll 文件：&lt;br&gt;
&lt;code&gt;TortoiseGitStub.dll&lt;/code&gt;&lt;/p&gt;
&lt;h2 id=&#34;tortoisegit-源码编译&#34;&gt;TortoiseGit 源码编译&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;TortoiseGit 的源码在 gitlab, clone 下来&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;code&gt;git clone https://gitlab.com/tortoisegit/tortoisegit.git&lt;/code&gt;&lt;/p&gt;
&lt;p&gt;克隆的有点慢，可以设置下代理 😉：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-shell&#34;&gt;git config --global http.proxy &amp;quot;10.0.1.1:1080&amp;quot;
git config --global https.proxy &amp;quot;10.0.1.1:1080&amp;quot;
&lt;/code&gt;&lt;/pre&gt;
&lt;ul&gt;
&lt;li&gt;我现在用的是官网最新稳定版 2.5&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;看下tag，切换到 2.5&lt;br&gt;
&lt;code&gt;git checkout REL_2.5.0.0_EXTERNAL&lt;/code&gt;&lt;br&gt;
查看 build.txt，依次 加载子模块，补丁。&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-shell&#34;&gt;git submodule update --init
cd ext/libgit2
for %%G in (..\libgit2-*.patch) do ( type %%G | git am --3way )
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;编译工程 TortoiseShell 完成得到 TortoiseGit.dll，后面浏览代码发现菜单添加在这里面。&lt;/p&gt;
&lt;h2 id=&#34;修改代码&#34;&gt;修改代码&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;工程 TortoiseShell 中 ContextMenu.cpp：1047&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code class=&#34;language-C++&#34;&gt;bIsTop = ((topmenu &amp;amp; menuInfo[menuIndex].menuID) != 0);
//bIsTop = false;
// insert the menu entry
InsertGitMenu(	bIsTop,
	bIsTop ? hMenu : subMenu,
	bIsTop ? indexMenu++ : indexSubMenu++,
	idCmd++,
	menuInfo[menuIndex].menuTextID,
	bShowIcons ? menuInfo[menuIndex].iconID : 0,
	idCmdFirst,
	menuInfo[menuIndex].command,
	uFlags);
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;简单的修改了 bIsTop，导致问是 最前面不会添加 &amp;quot;Git &amp;quot;，影响不大。&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;编译出 TortoiseGit.dll&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;替换和删除会不允许，但是可以重命名。放入新的之后重启资源管理器&lt;/p&gt;
&lt;p&gt;&lt;code&gt;taskkill /f /im explorer.exe &amp;amp;&amp;amp; start explorer&lt;/code&gt;&lt;/p&gt;
&lt;h2 id=&#34;最后效果&#34;&gt;最后效果：&lt;/h2&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://badsn.com/post-images/1559204726316.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h2 id=&#34;下载地址&#34;&gt;下载地址&lt;/h2&gt;
&lt;p&gt;&lt;a href=&#34;http://p.ucc.vc/1.%E5%BF%85%E5%A4%87%E5%B7%A5%E5%85%B7/TortoiseGit/TortoiseGit.zip&#34;&gt;TortoiseGit.zip&lt;/a&gt;&lt;/p&gt;
&lt;hr&gt;
&lt;p&gt;TortoiseSVN 的后面有时间再看看。。。&lt;/p&gt;
">TortoiseGit 右键菜单 全部折叠到二级菜单中</a>
        </div>

&lt;p&gt;点击 + 号, 选择 Tomcat Server&lt;br&gt;

&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;package beans;

public class Production {
    private int proId;
    private String proName;
    private String proDesc;
    private String proPrice;


    public Production(int proId, String proName, String proDesc, String proPrice) {
        this.proId = proId;
        this.proName = proName;
        this.proDesc = proDesc;
        this.proPrice = proPrice;
    }

    public Production() {
    }

    @Override
    public String toString() {
        return &amp;quot;Production{&amp;quot; +
                &amp;quot;proId=&amp;quot; + proId +
                &amp;quot;, proName=&#39;&amp;quot; + proName + &#39;\&#39;&#39; +
                &amp;quot;, proDesc=&#39;&amp;quot; + proDesc + &#39;\&#39;&#39; +
                &amp;quot;, proPrice=&#39;&amp;quot; + proPrice + &#39;\&#39;&#39; +
                &#39;}&#39;;
    }

    public int getProId() {
        return proId;
    }

    public void setProId(int proId) {
        this.proId = proId;
    }

    public String getProName() {
        return proName;
    }

    public void setProName(String proName) {
        this.proName = proName;
    }

    public String getProDesc() {
        return proDesc;
    }

    public void setProDesc(String proDesc) {
        this.proDesc = proDesc;
    }

    public String getProPrice() {
        return proPrice;
    }

    public void setProPrice(String proPrice) {
        this.proPrice = proPrice;
    }

    public String save() {

        System.out.println(&amp;quot;result:&amp;quot; + this);
        return &amp;quot;detail&amp;quot;;
    }
}

&lt;pre&gt;&lt;code class=&#34;language-xml&#34;&gt;&amp;lt;?xml version=&amp;quot;1.0&amp;quot; encoding=&amp;quot;UTF-8&amp;quot;?&amp;gt;

        <div class="item">
          <a class="result-title" href="https://badsn.com/post/visualgdb-52-zi-jin-cheng-diao-shi-yu-dao-de-wen-ti/"" data-c="&lt;p&gt;VisualGDB 是 Visual Studio 的一个插件，用于在 Windows 下开发 Linux 程序，记录 VisualGDB 调试 Linux 子进程方法&lt;/p&gt;
&lt;!-- more --&gt;
&lt;ul&gt;
&lt;li&gt;问题描述：&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;在 GDB 调试中，使用下面命令进行子进程调试，但在 VisualGDB 工程属性中 startup before 设置并不能生效&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;    set follow-fork-mode child
&lt;/code&gt;&lt;/pre&gt;
&lt;ul&gt;
&lt;li&gt;解决办法&lt;/li&gt;
&lt;/ul&gt;
&lt;ol&gt;
&lt;li&gt;VisualGDB 工程属性中 startup before 设置&lt;/li&gt;
&lt;/ol&gt;
&lt;pre&gt;&lt;code&gt;    set follow-fork-mode child
&lt;/code&gt;&lt;/pre&gt;
&lt;ol start=&#34;2&#34;&gt;
&lt;li&gt;调试，出现 SIGHUP 异常中断&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;img src=&#34;https://badsn.com/post-images/1559203564747.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
然后打开异常设置，如图勾选&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559203600985.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
完成此步骤后，调试子进程会不进入。&lt;/p&gt;
&lt;ol start=&#34;3&#34;&gt;
&lt;li&gt;调试子进程不进入&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;调试窗口 -- GDB Session -- Signals &amp;amp; Catchpoint （倒数第二个闪电按钮），取消 选择 SIGHUP 后面的 Pass to 选框&lt;br&gt;
&lt;img src=&#34;https://badsn.com/post-images/1559203615892.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
">VisualGDB 5.2 子进程调试 遇到的问题</a>

        <div class="item">
          <a class="result-title" href="https://badsn.com/post/hello-gridea/"" data-c="&lt;p&gt;👏  欢迎使用 &lt;strong&gt;Gridea&lt;/strong&gt; ！&lt;br&gt;
✍️  &lt;strong&gt;Gridea&lt;/strong&gt; 一个静态博客写作客户端。你可以用它来记录你的生活、心情、知识、笔记、创意... ...&lt;/p&gt;
&lt;!-- more --&gt;
&lt;p&gt;&lt;a href=&#34;https://github.com/getgridea/gridea&#34;&gt;Github&lt;/a&gt;&lt;br&gt;
&lt;a href=&#34;http://hvenotes.fehey.com/&#34;&gt;Gridea 主页&lt;/a&gt;&lt;br&gt;
&lt;a href=&#34;http://fehey.com/&#34;&gt;示例网站&lt;/a&gt;&lt;/p&gt;
&lt;h2 id=&#34;特性&#34;&gt;特性👇&lt;/h2&gt;
&lt;p&gt;📝  你可以使用最酷的 &lt;strong&gt;Markdown&lt;/strong&gt; 语法，进行快速创作&lt;/p&gt;
&lt;p&gt;🌉  你可以给文章配上精美的封面图和在文章任意位置插入图片&lt;/p&gt;
&lt;p&gt;🏷️  你可以对文章进行标签分组&lt;/p&gt;
&lt;p&gt;📋  你可以自定义菜单，甚至可以创建外部链接菜单&lt;/p&gt;
&lt;p&gt;💻  你可以在 &lt;strong&gt;𝖶𝗂𝗇𝖽𝗈𝗐𝗌&lt;/strong&gt; 或 &lt;strong&gt;𝖬𝖺𝖼𝖮𝖲&lt;/strong&gt; 设备上使用此客户端&lt;/p&gt;
&lt;p&gt;🌎  你可以使用 &lt;strong&gt;𝖦𝗂𝗍𝗁𝗎𝖻 𝖯𝖺𝗀𝖾𝗌&lt;/strong&gt; 或 &lt;strong&gt;Coding Pages&lt;/strong&gt; 向世界展示，未来将支持更多平台&lt;/p&gt;
&lt;p&gt;💬  你可以进行简单的配置，接入 &lt;a href=&#34;https://github.com/gitalk/gitalk&#34;&gt;Gitalk&lt;/a&gt; 或 &lt;a href=&#34;https://github.com/SukkaW/DisqusJS&#34;&gt;DisqusJS&lt;/a&gt; 评论系统&lt;/p&gt;
&lt;p&gt;🇬🇧  你可以使用&lt;strong&gt;中文简体&lt;/strong&gt;或&lt;strong&gt;英语&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;🌁  你可以任意使用应用内默认主题或任意第三方主题，强大的主题自定义能力&lt;/p&gt;
&lt;p&gt;🖥  你可以自定义源文件夹，利用 OneDrive、百度网盘、iCloud、Dropbox 等进行多设备同步&lt;/p&gt;
&lt;p&gt;🌱 当然 &lt;strong&gt;Gridea&lt;/strong&gt; 还很年轻，有很多不足，但请相信，它会不停向前🏃&lt;/p&gt;
&lt;p&gt;未来，它一定会成为你离不开的伙伴&lt;/p&gt;
&lt;p&gt;尽情发挥你的才华吧！&lt;/p&gt;
&lt;p&gt;😘 Enjoy~&lt;/p&gt;
">Hello Gridea</a>
        </div>

&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Qt&#34;,&#34;slug&#34;:&#34;dLj5FmCcZ&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/dLj5FmCcZ/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Git&#34;,&#34;slug&#34;:&#34;cqBF66KWF&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/cqBF66KWF/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Source&#34;,&#34;slug&#34;:&#34;tKr7mis07&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/tKr7mis07/&#34;}],&#34;date&#34;:&#34;2019-05-30 16:40:09&#34;,&#34;dateFormat&#34;:&#34;2019-05-30&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://badsn.com/post/qt512-git-yuan-ma-bian-yi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:65000,&#34;words&#34;:181,&#34;minutes&#34;:2},&#34;description&#34;:&#34;\n1. 源码获取\ngit clone https://code.qt.io/qt/qt5.git\ncd qt5\nperl init-repository\n\n2. 环境准备\n# msvc\ncall &amp;quot;C:\\Program Files...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1-%E6%BA%90%E7%A0%81%E8%8E%B7%E5%8F%96\&#34;&gt;1. 源码获取&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2-%E7%8E%AF%E5%A2%83%E5%87%86%E5%A4%87\&#34;&gt;2. 环境准备&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#3-%E7%BC%96%E8%AF%91\&#34;&gt;3. 编译&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;记录遇到使用过的 Windows 注册表相关&lt;/p&gt;\n&lt;!--more--&gt;\n&lt;h2 id=\&#34;问题类\&#34;&gt;问题类&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;描述&lt;br&gt;\n某个软件，不能选择应用为默认打开程序。例如 &lt;code&gt;.jar&lt;/code&gt; 文件，默认使用 &lt;code&gt;jd-gui.exe&lt;/code&gt; 打开。选择默认程序窗口中，浏览 &lt;code&gt;jd-gui.exe&lt;/code&gt; 并没有在列表中出现。&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;原因&lt;br&gt;\n原有使用 &lt;code&gt;jd-gui.exe&lt;/code&gt; 打开，但程序路径发生改变，注册表保存了原有的路径。&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;解决&lt;br&gt;\n删除注册表&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-bash\&#34;&gt;HKEY_CURRENT_USER\\Software\\Classes\\Applications\\jd-gui.exe\n&lt;/code&gt;&lt;/pre&gt;\n&lt;hr&gt;\n&lt;h2 id=\&#34;应用类\&#34;&gt;应用类&lt;/h2&gt;\n&lt;hr&gt;\n&#34;,&#34;fileName&#34;:&#34;windows-zhu-ce-biao-bi-ji&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;记录遇到使用过的 Windows 注册表相关&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Windows 注册表笔记&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;nBCyNz-RP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/nBCyNz-RP/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows 7&#34;,&#34;slug&#34;:&#34;FOcgzGK_G&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/FOcgzGK_G/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Registry&#34;,&#34;slug&#34;:&#34;1Vnn-YsWE&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/1Vnn-YsWE/&#34;}],&#34;date&#34;:&#34;2019-05-30 16:32:45&#34;,&#34;dateFormat&#34;:&#34;2019-05-30&#34;,&#34;feature&#34;:&#34;https://badsn.com/post-images/windows-zhu-ce-biao-bi-ji.jpg&#34;,&#34;link&#34;:&#34;https://badsn.com/post/windows-zhu-ce-biao-bi-ji/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:27000,&#34;words&#34;:121,&#34;minutes&#34;:1},&#34;description&#34;:&#34;记录遇到使用过的 Windows 注册表相关\n\n问题类\n\n\n描述\n某个软件，不能选择应用为默认打开程序。例如 .jar 文件，默认使用 jd-gui.exe 打开。选择默认程序窗口中，浏览 jd-gui.exe 并没有在列表中出现。\n\n\n原...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E9%97%AE%E9%A2%98%E7%B1%BB\&#34;&gt;问题类&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%BA%94%E7%94%A8%E7%B1%BB\&#34;&gt;应用类&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;Win7 下修改网卡的 Mac 地址&lt;/p&gt;\n&lt;!--more--&gt;\n&lt;p&gt;##操作步骤&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;查看网卡的驱动关键字&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;用你熟悉的方式打开是配置设置，然后点击属性：&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559205048893.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;然后点击配置，在详细信息里找到 “驱动程序关键字”：&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559205054562.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;记录：&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;{4d36e972-e325-11ce-bfc1-08002be10318}\\0012&lt;/code&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;打开注册表&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;注册表位置是：&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Class\\&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;后面添加上一步记录的 CLSID 得到：&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Class\\{4d36e972-e325-11ce-bfc1-08002be10318}\\0012&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;打开注册表，可以看到一些信息，确认是当前网卡注册表。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;修改或添加注册表&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;打开上面目录下的&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;*\\Ndi\\Params\\NetworkAddress&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;查看到内容：&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559205062009.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;可以看到 “ParamDesc” 的描述是 “本地管理地址”，继续第一步，打开高级选项卡，找到 “本地管理地址”选项，填写地址即可：&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559205067084.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;然后查看 MAC 地址已经被修改了。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;未找到注册表&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;如果未找到 “NetworkAddress” 注册表，可以手动添加，注册表内容如下：&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;Windows Registry Editor Version 5.00\n\n[HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Class\\{4D36E972-E325-11CE-BFC1-08002BE10318}\\0012\\Ndi\\Params\\NetworkAddress]\n&amp;quot;ParamDesc&amp;quot;=&amp;quot;本地管理地址&amp;quot;\n&amp;quot;Default&amp;quot;=&amp;quot;&amp;quot;\n&amp;quot;type&amp;quot;=&amp;quot;edit&amp;quot;\n&amp;quot;LimitText&amp;quot;=&amp;quot;12&amp;quot;\n&amp;quot;UpperCase&amp;quot;=&amp;quot;1&amp;quot;\n&amp;quot;optional&amp;quot;=&amp;quot;1&amp;quot;\n\n&lt;/code&gt;&lt;/pre&gt;\n&#34;,&#34;fileName&#34;:&#34;win7-xiu-gai-wang-qia-mac-di-zhi&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;Win7 下修改网卡的 Mac 地址&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Win7 修改网卡 MAC 地址&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;MAC&#34;,&#34;slug&#34;:&#34;4PysjdBd6&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/4PysjdBd6/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;nBCyNz-RP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/nBCyNz-RP/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows 7&#34;,&#34;slug&#34;:&#34;FOcgzGK_G&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/FOcgzGK_G/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Registry&#34;,&#34;slug&#34;:&#34;1Vnn-YsWE&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/1Vnn-YsWE/&#34;}],&#34;date&#34;:&#34;2019-05-30 16:29:57&#34;,&#34;dateFormat&#34;:&#34;2019-05-30&#34;,&#34;feature&#34;:&#34;https://badsn.com/post-images/win7-xiu-gai-wang-qia-mac-di-zhi.jpg&#34;,&#34;link&#34;:&#34;https://badsn.com/post/win7-xiu-gai-wang-qia-mac-di-zhi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:75000,&#34;words&#34;:304,&#34;minutes&#34;:2},&#34;description&#34;:&#34;Win7 下修改网卡的 Mac 地址\n\n##操作步骤\n\n查看网卡的驱动关键字\n\n用你熟悉的方式打开是配置设置，然后点击属性：\n\n然后点击配置，在详细信息里找到 “驱动程序关键字”：\n\n记录：\n{4d36e972-e325-11ce-bfc1...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;TortoiseGit 和 TortoiseSVN 都安装时，右键菜单会很长，尝试将 TortoiseGit 的 Clone 菜单折叠到二级菜单中&lt;/p&gt;\n&lt;!--more--&gt;\n&lt;p&gt;默认效果：&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204682888.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;太占空间，希望能把两个菜单折叠到一个里。&lt;/p&gt;\n&lt;h2 id=\&#34;查找资料\&#34;&gt;查找资料&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;google，百度 查找右键菜单。&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;查找折叠菜单，二级菜单，均没有实现。&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;解决办法\&#34;&gt;解决办法&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;上面百度到右键菜单在注册表相关，桌面右键为例：&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;普通右键菜单：&lt;br&gt;\n&lt;code&gt;HKEY_LOCAL_MACHINE\\SOFTWARE\\Classes\\Directory\\Background\\shell&lt;/code&gt;&lt;br&gt;\n可以看到下面有 “在此处运行 CMD”&lt;br&gt;\nCOM组件右键菜单：&lt;br&gt;\n&lt;code&gt;HKEY_LOCAL_MACHINE\\SOFTWARE\\Classes\\Directory\\Background\\shellex&lt;/code&gt;&lt;br&gt;\n可以看到下面有 TortoiseGit 和 TortoiseSVN 和其他的（新建，分享，小工具）。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;实验解决办法 一（未成功）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;在 shell 下创建子菜单，将 COM 组件的菜单移到里面。失败。。。。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;实验解决办法 二 （成功）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;突然想到 这个是开源项目啊，还有一个修改代码实现的方法，查看 TortoiseGit 右键菜单的 CLSID :&lt;br&gt;\n&lt;code&gt;{10A0FDD2-B0C0-4CD4-A7AE-E594CE3B91C8}&lt;/code&gt;&lt;br&gt;\n可以看到注册的 dll 文件：&lt;br&gt;\n&lt;code&gt;TortoiseGitStub.dll&lt;/code&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;tortoisegit-源码编译\&#34;&gt;TortoiseGit 源码编译&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;TortoiseGit 的源码在 gitlab, clone 下来&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;&lt;code&gt;git clone https://gitlab.com/tortoisegit/tortoisegit.git&lt;/code&gt;&lt;/p&gt;\n&lt;p&gt;克隆的有点慢，可以设置下代理 😉：&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;git config --global http.proxy &amp;quot;10.0.1.1:1080&amp;quot;\ngit config --global https.proxy &amp;quot;10.0.1.1:1080&amp;quot;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul&gt;\n&lt;li&gt;我现在用的是官网最新稳定版 2.5&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;看下tag，切换到 2.5&lt;br&gt;\n&lt;code&gt;git checkout REL_2.5.0.0_EXTERNAL&lt;/code&gt;&lt;br&gt;\n查看 build.txt，依次 加载子模块，补丁。&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-shell\&#34;&gt;git submodule update --init\ncd ext/libgit2\nfor %%G in (..\\libgit2-*.patch) do ( type %%G | git am --3way )\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;编译工程 TortoiseShell 完成得到 TortoiseGit.dll，后面浏览代码发现菜单添加在这里面。&lt;/p&gt;\n&lt;h2 id=\&#34;修改代码\&#34;&gt;修改代码&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;工程 TortoiseShell 中 ContextMenu.cpp：1047&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-C++\&#34;&gt;bIsTop = ((topmenu &amp;amp; menuInfo[menuIndex].menuID) != 0);\n//bIsTop = false;\n// insert the menu entry\nInsertGitMenu(\tbIsTop,\n\tbIsTop ? hMenu : subMenu,\n\tbIsTop ? indexMenu++ : indexSubMenu++,\n\tidCmd++,\n\tmenuInfo[menuIndex].menuTextID,\n\tbShowIcons ? menuInfo[menuIndex].iconID : 0,\n\tidCmdFirst,\n\tmenuInfo[menuIndex].command,\n\tuFlags);\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;简单的修改了 bIsTop，导致问是 最前面不会添加 &amp;quot;Git &amp;quot;，影响不大。&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;编译出 TortoiseGit.dll&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;替换和删除会不允许，但是可以重命名。放入新的之后重启资源管理器&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;taskkill /f /im explorer.exe &amp;amp;&amp;amp; start explorer&lt;/code&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;最后效果\&#34;&gt;最后效果：&lt;/h2&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://badsn.com/post-images/1559204726316.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;下载地址\&#34;&gt;下载地址&lt;/h2&gt;\n&lt;p&gt;&lt;a href=\&#34;http://p.ucc.vc/1.%E5%BF%85%E5%A4%87%E5%B7%A5%E5%85%B7/TortoiseGit/TortoiseGit.zip\&#34;&gt;TortoiseGit.zip&lt;/a&gt;&lt;/p&gt;\n&lt;hr&gt;\n&lt;p&gt;TortoiseSVN 的后面有时间再看看。。。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;tortoisegit-you-jian-cai-dan-quan-bu-zhe-die-dao-er-ji-cai-dan-zhong&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;TortoiseGit 和 TortoiseSVN 都安装时，右键菜单会很长，尝试将 TortoiseGit 的 Clone 菜单折叠到二级菜单中&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;TortoiseGit 右键菜单 全部折叠到二级菜单中&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;TortoiseGit&#34;,&#34;slug&#34;:&#34;1y9V0eO6U&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/1y9V0eO6U/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;TortoiseSVN&#34;,&#34;slug&#34;:&#34;uIT8w1DlO&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/uIT8w1DlO/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;nBCyNz-RP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/nBCyNz-RP/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Registry&#34;,&#34;slug&#34;:&#34;1Vnn-YsWE&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/1Vnn-YsWE/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Git&#34;,&#34;slug&#34;:&#34;cqBF66KWF&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/cqBF66KWF/&#34;}],&#34;date&#34;:&#34;2019-05-30 16:21:39&#34;,&#34;dateFormat&#34;:&#34;2019-05-30&#34;,&#34;feature&#34;:&#34;https://badsn.com/post-images/tortoisegit-you-jian-cai-dan-quan-bu-zhe-die-dao-er-ji-cai-dan-zhong.png&#34;,&#34;link&#34;:&#34;https://badsn.com/post/tortoisegit-you-jian-cai-dan-quan-bu-zhe-die-dao-er-ji-cai-dan-zhong/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:135000,&#34;words&#34;:535,&#34;minutes&#34;:3},&#34;description&#34;:&#34;TortoiseGit 和 TortoiseSVN 都安装时，右键菜单会很长，尝试将 TortoiseGit 的 Clone 菜单折叠到二级菜单中\n\n默认效果：\n\n太占空间，希望能把两个菜单折叠到一个里。\n查找资料\n\n\ngoogle，百度 ...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9F%A5%E6%89%BE%E8%B5%84%E6%96%99\&#34;&gt;查找资料&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A7%A3%E5%86%B3%E5%8A%9E%E6%B3%95\&#34;&gt;解决办法&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#tortoisegit-%E6%BA%90%E7%A0%81%E7%BC%96%E8%AF%91\&#34;&gt;TortoiseGit 源码编译&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BF%AE%E6%94%B9%E4%BB%A3%E7%A0%81\&#34;&gt;修改代码&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%80%E5%90%8E%E6%95%88%E6%9E%9C\&#34;&gt;最后效果：&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8B%E8%BD%BD%E5%9C%B0%E5%9D%80\&#34;&gt;下载地址&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;以 “问题 -- 原因 -- 解决”的方式记录 IDEA 的使用笔记&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;h4 id=\&#34;1-tools-generate-javadoc-出现错误\&#34;&gt;1. Tools -&amp;gt; Generate JavaDoc 出现错误&lt;/h4&gt;\n&lt;blockquote&gt;\n&lt;p&gt;错误: 编码GBK的不可映射字符&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;在下面【Other command line arguments】中添加：&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-bash\&#34;&gt;-encoding utf-8 -charset utf-8\n&lt;/code&gt;&lt;/pre&gt;\n&lt;hr&gt;\n&#34;,&#34;fileName&#34;:&#34;ji-lu-idea-shi-yong-zhong-yu-dao-de-wen-ti&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;以 “问题 -- 原因 -- 解决”的方式记录 IDEA 的使用笔记&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;IDEA 使用笔记&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;IDEA&#34;,&#34;slug&#34;:&#34;Sfg1Ntwsz&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/Sfg1Ntwsz/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;nBCyNz-RP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/nBCyNz-RP/&#34;}],&#34;date&#34;:&#34;2019-05-30 16:18:47&#34;,&#34;dateFormat&#34;:&#34;2019-05-30&#34;,&#34;feature&#34;:&#34;https://badsn.com/post-images/ji-lu-idea-shi-yong-zhong-yu-dao-de-wen-ti.png&#34;,&#34;link&#34;:&#34;https://badsn.com/post/ji-lu-idea-shi-yong-zhong-yu-dao-de-wen-ti/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:13000,&#34;words&#34;:55,&#34;minutes&#34;:1},&#34;description&#34;:&#34;以 “问题 -- 原因 -- 解决”的方式记录 IDEA 的使用笔记\n\n1. Tools -&amp;gt; Generate JavaDoc 出现错误\n\n错误: 编码GBK的不可映射字符\n\n在下面【Other command line argum...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1-tools-generate-javadoc-%E5%87%BA%E7%8E%B0%E9%94%99%E8%AF%AF\&#34;&gt;1. Tools -&amp;gt; Generate JavaDoc 出现错误&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;IDEA 和 Struts2 参考其他资料的 HelloWorld&lt;/p&gt;\n&lt;!--more--&gt;\n&lt;h3 id=\&#34;基本环境\&#34;&gt;基本环境&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;JAVA 配置&lt;/li&gt;\n&lt;li&gt;Tomcat 配置&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;工程创建\&#34;&gt;工程创建&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;下载 Struts 2&lt;/li&gt;\n&lt;li&gt;创建 Hello World 工程&lt;/li&gt;\n&lt;li&gt;修复 Project Setting&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;测试源码\&#34;&gt;测试源码&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;添加测试源码&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr&gt;\n&lt;h2 id=\&#34;基本环境-2\&#34;&gt;基本环境&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;已经熟悉如何配置则跳过基本环境配置。&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\&#34;工程默认-java-设置\&#34;&gt;工程默认 JAVA 设置&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;选择设置 File -&amp;gt; Other Settings -&amp;gt; Default Project Structure...&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204110304.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Project Settings -&amp;gt; Project&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204120489.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;添加 JAVA 目录后完成设置&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204126983.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;tomcat-配置\&#34;&gt;Tomcat 配置&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;选择设置 File -&amp;gt; Other Settings...&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204140398.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Build, Execution, Deployment -&amp;gt; Application Servers&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204146703.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;点击 + 号, 选择 Tomcat Server&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204156872.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;选择本地 Tomcat 目录后添加完成。&lt;/p&gt;\n&lt;h2 id=\&#34;工程创建-2\&#34;&gt;工程创建&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;首先到官网下载 Struts2 依赖&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;http://mirrors.tuna.tsinghua.edu.cn/apache/struts/2.3.34/struts-2.3.34-min-lib.zip&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;解压到 path_to_your_project/lib 下&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;struts_hello/lib&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;IDEA 选择 File -&amp;gt; New -&amp;gt; Project&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204209475.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;选择 Java Enterprise -&amp;gt; Struts 2&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204214949.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Library 选择上面下载的 2.3 目录&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;也可以直接使用 Download 选项的 2.5，注意 2.5 版本依赖的 log4j&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204222775.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;添加完成&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204228179.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;选择目录&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204233146.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;创建完成后 目录结构&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204237787.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;打开工程设置&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204242258.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;Project Settings -&amp;gt; Artifacts&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;可以看到有个 Problems&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204247954.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;点击 Fix 按钮，选择 Add &amp;quot;Struts2&amp;quot; to the Artifacts；&lt;br&gt;\n或者&lt;br&gt;\n双击 Available Elements 窗口下的 Struts 2&lt;br&gt;\n将 Struts2 依赖添加到 部署输出目录中。&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204254075.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;测试源码-2\&#34;&gt;测试源码&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;在工程目录下添加下面文件&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;ul&gt;\n&lt;li&gt;src/beans/Production.java&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;package beans;\n\npublic class Production {\n    private int proId;\n    private String proName;\n    private String proDesc;\n    private String proPrice;\n\n\n    public Production(int proId, String proName, String proDesc, String proPrice) {\n        this.proId = proId;\n        this.proName = proName;\n        this.proDesc = proDesc;\n        this.proPrice = proPrice;\n    }\n\n    public Production() {\n    }\n\n    @Override\n    public String toString() {\n        return &amp;quot;Production{&amp;quot; +\n                &amp;quot;proId=&amp;quot; + proId +\n                &amp;quot;, proName=&#39;&amp;quot; + proName + &#39;\\&#39;&#39; +\n                &amp;quot;, proDesc=&#39;&amp;quot; + proDesc + &#39;\\&#39;&#39; +\n                &amp;quot;, proPrice=&#39;&amp;quot; + proPrice + &#39;\\&#39;&#39; +\n                &#39;}&#39;;\n    }\n\n    public int getProId() {\n        return proId;\n    }\n\n    public void setProId(int proId) {\n        this.proId = proId;\n    }\n\n    public String getProName() {\n        return proName;\n    }\n\n    public void setProName(String proName) {\n        this.proName = proName;\n    }\n\n    public String getProDesc() {\n        return proDesc;\n    }\n\n    public void setProDesc(String proDesc) {\n        this.proDesc = proDesc;\n    }\n\n    public String getProPrice() {\n        return proPrice;\n    }\n\n    public void setProPrice(String proPrice) {\n        this.proPrice = proPrice;\n    }\n\n    public String save() {\n\n        System.out.println(&amp;quot;result:&amp;quot; + this);\n        return &amp;quot;detail&amp;quot;;\n    }\n}\n\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul&gt;\n&lt;li&gt;web/details.jsp&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-jsp\&#34;&gt;&amp;lt;%@ page contentType=&amp;quot;text/html;charset=UTF-8&amp;quot; language=&amp;quot;java&amp;quot; %&amp;gt;\n&amp;lt;html&amp;gt;\n&amp;lt;head&amp;gt;\n    &amp;lt;title&amp;gt;details&amp;lt;/title&amp;gt;\n&amp;lt;/head&amp;gt;\n&amp;lt;body&amp;gt;\n    productID:${proId}&amp;lt;br&amp;gt;\n    productName:${proName}&amp;lt;br&amp;gt;\n    productDesc:${proDesc}&amp;lt;br&amp;gt;\n    productPrice:${proPrice}&amp;lt;br&amp;gt;\n&amp;lt;/body&amp;gt;\n&amp;lt;/html&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul&gt;\n&lt;li&gt;web/input.jsp&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-jsp\&#34;&gt;&amp;lt;%@ page contentType=&amp;quot;text/html;charset=UTF-8&amp;quot; language=&amp;quot;java&amp;quot; %&amp;gt;\n&amp;lt;html&amp;gt;\n&amp;lt;head&amp;gt;\n    &amp;lt;title&amp;gt;输入内容&amp;lt;/title&amp;gt;\n&amp;lt;/head&amp;gt;\n&amp;lt;body&amp;gt;\n&amp;lt;form action=&amp;quot;product-save.action&amp;quot; method=&amp;quot;post&amp;quot;&amp;gt;\n    productName:&amp;lt;input type=&amp;quot;text&amp;quot; name=&amp;quot;proName&amp;quot;&amp;gt;&amp;lt;br&amp;gt;\n    productDesc:&amp;lt;input type=&amp;quot;text&amp;quot; name=&amp;quot;proDesc&amp;quot;&amp;gt;&amp;lt;br&amp;gt;\n    productPrice:&amp;lt;input type=&amp;quot;text&amp;quot; name=&amp;quot;proPrice&amp;quot;&amp;gt;&amp;lt;br&amp;gt;\n    &amp;lt;input type=&amp;quot;submit&amp;quot; value=&amp;quot;确定&amp;quot;&amp;gt;\n&amp;lt;/form&amp;gt;\n&amp;lt;/body&amp;gt;\n&amp;lt;/html&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;blockquote&gt;\n&lt;p&gt;修改下面文件，具体内容如下&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;ul&gt;\n&lt;li&gt;web/WEB-INF/web.xm&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-xml\&#34;&gt;&amp;lt;?xml version=&amp;quot;1.0&amp;quot; encoding=&amp;quot;UTF-8&amp;quot;?&amp;gt;\n&amp;lt;web-app xmlns=&amp;quot;http://xmlns.jcp.org/xml/ns/javaee&amp;quot;\n         xmlns:xsi=&amp;quot;http://www.w3.org/2001/XMLSchema-instance&amp;quot;\n         xsi:schemaLocation=&amp;quot;http://xmlns.jcp.org/xml/ns/javaee http://xmlns.jcp.org/xml/ns/javaee/web-app_3_1.xsd&amp;quot;\n         version=&amp;quot;3.1&amp;quot;&amp;gt;\n    &amp;lt;filter&amp;gt;\n        &amp;lt;filter-name&amp;gt;struts2&amp;lt;/filter-name&amp;gt;\n        &amp;lt;filter-class&amp;gt;org.apache.struts2.dispatcher.ng.filter.StrutsPrepareAndExecuteFilter&amp;lt;/filter-class&amp;gt;\n    &amp;lt;/filter&amp;gt;\n    &amp;lt;filter-mapping&amp;gt;\n        &amp;lt;filter-name&amp;gt;struts2&amp;lt;/filter-name&amp;gt;\n        &amp;lt;url-pattern&amp;gt;/*&amp;lt;/url-pattern&amp;gt;\n    &amp;lt;/filter-mapping&amp;gt;\n    &amp;lt;welcome-file-list&amp;gt;\n        &amp;lt;welcome-file&amp;gt;index.jsp&amp;lt;/welcome-file&amp;gt;\n    &amp;lt;/welcome-file-list&amp;gt;\n&amp;lt;/web-app&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul&gt;\n&lt;li&gt;web/index.jsp&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-jsp\&#34;&gt;&amp;lt;%@ page contentType=&amp;quot;text/html;charset=UTF-8&amp;quot; language=&amp;quot;java&amp;quot; %&amp;gt;\n&amp;lt;html&amp;gt;\n&amp;lt;head&amp;gt;\n    &amp;lt;title&amp;gt;输入内容&amp;lt;/title&amp;gt;\n&amp;lt;/head&amp;gt;\n&amp;lt;body&amp;gt;\n&amp;lt;form action=&amp;quot;product-save.action&amp;quot; method=&amp;quot;post&amp;quot;&amp;gt;\n    productName:&amp;lt;input type=&amp;quot;text&amp;quot; name=&amp;quot;proName&amp;quot;&amp;gt;&amp;lt;br&amp;gt;\n    productDesc:&amp;lt;input type=&amp;quot;text&amp;quot; name=&amp;quot;proDesc&amp;quot;&amp;gt;&amp;lt;br&amp;gt;\n    productPrice:&amp;lt;input type=&amp;quot;text&amp;quot; name=&amp;quot;proPrice&amp;quot;&amp;gt;&amp;lt;br&amp;gt;\n    &amp;lt;input type=&amp;quot;submit&amp;quot; value=&amp;quot;确定&amp;quot;&amp;gt;\n&amp;lt;/form&amp;gt;\n&amp;lt;/body&amp;gt;\n&amp;lt;/html&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul&gt;\n&lt;li&gt;src/struts.xml&lt;/li&gt;\n&lt;/ul&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-xml\&#34;&gt;&amp;lt;?xml version=&amp;quot;1.0&amp;quot; encoding=&amp;quot;UTF-8&amp;quot;?&amp;gt;\n\n&amp;lt;!DOCTYPE struts PUBLIC\n        &amp;quot;-//Apache Software Foundation//DTD Struts Configuration 2.3//EN&amp;quot;\n        &amp;quot;http://struts.apache.org/dtds/struts-2.3.dtd&amp;quot;&amp;gt;\n\n&amp;lt;struts&amp;gt;\n    &amp;lt;!--&amp;lt;constant name=&amp;quot;struts.devMode&amp;quot; value=&amp;quot;true&amp;quot;/&amp;gt;--&amp;gt;\n    &amp;lt;package name=&amp;quot;default&amp;quot; extends=&amp;quot;struts-default&amp;quot;&amp;gt;\n\n        &amp;lt;!--首页请求，name对应index.jsp中的action名字--&amp;gt;\n        &amp;lt;action name=&amp;quot;product-input&amp;quot;&amp;gt;\n\n            &amp;lt;!--转到input.jsp页面--&amp;gt;\n            &amp;lt;result&amp;gt;/input.jsp&amp;lt;/result&amp;gt;\n        &amp;lt;/action&amp;gt;\n\n\n        &amp;lt;!--第二个action请求，name对应input.jsp下的action名字\n        引用对象以及其方法--&amp;gt;\n        &amp;lt;action name=&amp;quot;product-save&amp;quot; class=&amp;quot;beans.Production&amp;quot; method=&amp;quot;save&amp;quot;&amp;gt;\n\n            &amp;lt;!--引用方法中返回的detai，对应name，展示到details下--&amp;gt;\n            &amp;lt;result name=&amp;quot;detail&amp;quot;&amp;gt;/details.jsp&amp;lt;/result&amp;gt;\n\n        &amp;lt;/action&amp;gt;\n\n    &amp;lt;/package&amp;gt;\n&amp;lt;/struts&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;添加完成后点击 Run&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204183108.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;等待 Tomcat 启动成功，自动打开浏览器：&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559204273264.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://badsn.com/post-images/1559204278802.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://badsn.com/post-images/1559204283631.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://badsn.com/post-images/1559204293114.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;参考引用\&#34;&gt;参考引用&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;a href=\&#34;http://struts.apache.org/getting-started/hello-world-using-struts2.html\&#34; title=\&#34;Hello World Using Struts 2\&#34;&gt;Hello World Using Struts 2&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;http://www.cnblogs.com/share2015/p/5279605.html\&#34; title=\&#34;idea 配置一个struts2的简单的helloWorld\&#34;&gt;idea 配置一个struts2的简单的helloWorld&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;https://jingyan.baidu.com/article/6b97984dc9f1a31ca2b0bf24.html\&#34; title=\&#34;idea设置程序默认使用JDK\&#34;&gt;idea设置程序默认使用JDK&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;http://blog.csdn.net/dream_an/article/details/49020211\&#34; title=\&#34;intellij IDEA配置tomcat\&#34;&gt;intellij IDEA配置tomcat&lt;/a&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;/blockquote&gt;\n&#34;,&#34;fileName&#34;:&#34;idea-chuang-jian-struts2-jian-dan-gong-cheng&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;IDEA 和 Struts2 参考其他资料的 HelloWorld&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;IDEA 创建 Struts2 简单工程&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Struts2&#34;,&#34;slug&#34;:&#34;gBWhub-Jk&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/gBWhub-Jk/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;IDEA&#34;,&#34;slug&#34;:&#34;Sfg1Ntwsz&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/Sfg1Ntwsz/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;nBCyNz-RP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://badsn.com/tag/nBCyNz-RP/&#34;}],&#34;date&#34;:&#34;2019-05-30 16:12:25&#34;,&#34;dateFormat&#34;:&#34;2019-05-30&#34;,&#34;feature&#34;:&#34;https://badsn.com/post-images/idea-chuang-jian-struts2-jian-dan-gong-cheng.png&#34;,&#34;link&#34;:&#34;https://badsn.com/post/idea-chuang-jian-struts2-jian-dan-gong-cheng/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;7 min read&#34;,&#34;time&#34;:378000,&#34;words&#34;:1164,&#34;minutes&#34;:7},&#34;description&#34;:&#34;IDEA 和 Struts2 参考其他资料的 HelloWorld\n\n基本环境\n\nJAVA 配置\nTomcat 配置\n\n工程创建\n\n下载 Struts 2\n创建 Hello World 工程\n修复 Project Setting\n\n测试源码...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9F%BA%E6%9C%AC%E7%8E%AF%E5%A2%83\&#34;&gt;基本环境&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%B7%A5%E7%A8%8B%E5%88%9B%E5%BB%BA\&#34;&gt;工程创建&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95%E6%BA%90%E7%A0%81\&#34;&gt;测试源码&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9F%BA%E6%9C%AC%E7%8E%AF%E5%A2%83-2\&#34;&gt;基本环境&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%B7%A5%E7%A8%8B%E9%BB%98%E8%AE%A4-java-%E8%AE%BE%E7%BD%AE\&#34;&gt;工程默认 JAVA 设置&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#tomcat-%E9%85%8D%E7%BD%AE\&#34;&gt;Tomcat 配置&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%B7%A5%E7%A8%8B%E5%88%9B%E5%BB%BA-2\&#34;&gt;工程创建&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%B5%8B%E8%AF%95%E6%BA%90%E7%A0%81-2\&#34;&gt;测试源码&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%8F%82%E8%80%83%E5%BC%95%E7%94%A8\&#34;&gt;参考引用&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;VisualGDB 是 Visual Studio 的一个插件，用于在 Windows 下开发 Linux 程序，记录 VisualGDB 调试 Linux 子进程方法&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;ul&gt;\n&lt;li&gt;问题描述：&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;在 GDB 调试中，使用下面命令进行子进程调试，但在 VisualGDB 工程属性中 startup before 设置并不能生效&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;    set follow-fork-mode child\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ul&gt;\n&lt;li&gt;解决办法&lt;/li&gt;\n&lt;/ul&gt;\n&lt;ol&gt;\n&lt;li&gt;VisualGDB 工程属性中 startup before 设置&lt;/li&gt;\n&lt;/ol&gt;\n&lt;pre&gt;&lt;code&gt;    set follow-fork-mode child\n&lt;/code&gt;&lt;/pre&gt;\n&lt;ol start=\&#34;2\&#34;&gt;\n&lt;li&gt;调试，出现 SIGHUP 异常中断&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;&lt;img src=\&#34;https://badsn.com/post-images/1559203564747.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n然后打开异常设置，如图勾选&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559203600985.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n完成此步骤后，调试子进程会不进入。&lt;/p&gt;\n&lt;ol start=\&#34;3\&#34;&gt;\n&lt;li&gt;调试子进程不进入&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;调试窗口 -- GDB Session -- Signals &amp;amp; Catchpoint （倒数第二个闪电按钮），取消 选择 SIGHUP 后面的 Pass to 选框&lt;br&gt;\n&lt;img src=\&#34;https://badsn.com/post-images/1559203615892.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;visualgdb-52-zi-jin-cheng-diao-shi-yu-dao-de-wen-ti&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;VisualGDB 是 Visual Studio 的一个插件，用于在 Windows 下开发 Linux 程序，记录 VisualGDB 调试 Linux 子进程方法&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;VisualGDB 5.2 子进程调试 遇到的问题&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Linux&#34;,&#34;slug&#34;:&#34;a3IO8ZlIz&#34;,&#34
